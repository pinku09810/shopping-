<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoping with Psy</title>

<style>
body {font-family: Arial; background:#fdf6f0; margin:0;}
nav {display:flex; justify-content:space-between; padding:1rem; background:white;}
nav h1 {color:#e8aeb7;}

.grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:20px;}
.card {background:white; padding:10px; border-radius:10px; text-align:center;}
.card img {width:100%; height:200px; object-fit:cover;}

.btn {background:#e8aeb7; color:white; padding:8px; border:none; cursor:pointer;}

.cart-btn {
position:fixed;
right:20px;
bottom:20px;
background:#e8aeb7;
color:white;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.cart-box {
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-5px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

.cart-box.active {right:0;}

.cart-item {margin-bottom:10px;}

.checkout {
background:#e8aeb7;
color:white;
padding:10px;
width:100%;
border:none;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<h1>Shoping with Psy</h1>
</nav>

<div class="grid">

<div class="card">
<img src="Screenshot%202026-04-10%20210316.png">
<h3>Korean Pants</h3>
<p>₹1500</p>
<button class="btn" onclick="addToCart('Korean Pants',1500)">Add</button>
</div>

<div class="card">
<img src="Screenshot%202026-04-10%20210333.png">
<h3>Korean Pants Beige</h3>
<p>₹1500</p>
<button class="btn" onclick="addToCart('Korean Pants Beige',1500)">Add</button>
</div>

<div class="card">
<img src="Screenshot%202026-04-10%20210403.png">
<h3>Jeans</h3>
<p>₹2000</p>
<button class="btn" onclick="addToCart('Jeans',2000)">Add</button>
</div>

<div class="card">
<img src="Screenshot%202026-04-10%20210423.png">
<h3>Shirt</h3>
<p>₹300</p>
<button class="btn" onclick="addToCart('Shirt',300)">Add</button>
</div>

</div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="cart-box" id="cartBox">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3 id="total">Total: ₹0</h3>
<button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];

function addToCart(name, price){
cart.push({name,price});
updateCart();
}

function updateCart(){
let itemsHTML = "";
let total = 0;

cart.forEach((item,index)=>{
total += item.price;
itemsHTML += `
<div class="cart-item">
${item.name} - ₹${item.price}
<button onclick="removeItem(${index})">❌</button>
</div>`;
});

document.getElementById("cartItems").innerHTML = itemsHTML;
document.getElementById("total").innerText = "Total: ₹" + total;
}

function removeItem(index){
cart.splice(index,1);
updateCart();
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active");
}

function checkout(){
alert("Order placed successfully 😎🔥");
cart=[];
updateCart();
}
</script>

</body>
</html>
